<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to TimeBanking</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
           background-image: url("{{ url_for('static', filename='image2.png') }}");
            background-size: cover;
            background-position: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Overlay for readability */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Main content box */
        .container {
            position: relative;
            text-align: center;
            color: white;
            z-index: 1;
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background-color: #00c6ff;
            color: white;
        }

        .btn-primary:hover {
            background-color: #0072ff;
            transform: scale(1.05);
        }

        .btn-secondary {
            background-color: white;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #ddd;
            transform: scale(1.05);
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <h1>⏳ TimeBank</h1>
    <p>Exchange Skills. Earn Time. Build Community.</p>

    <a href="/login"><button class="btn btn-primary">Login</button></a>
    <a href="/register"><button class="btn btn-secondary">Register</button></a>
</div>

</body>
</html>
